name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Automation smoke validation
        env:
          AUTOMATION_SMOKE_REPORT_PATH: ${{ runner.temp }}/automation-smoke-report.json
        run: npm run automation:smoke

      - name: Upload automation smoke report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: automation-smoke-report
          path: ${{ runner.temp }}/automation-smoke-report.json
          if-no-files-found: warn

      - name: Build
        run: npm run build
